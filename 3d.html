<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布朗運動 3D 模擬</title>
    <!-- 引入 Three.js 與 OrbitControls 實現強大的滑鼠互動（旋轉、縮放、平移） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        canvas { display: block; }
        
        /* 淺色毛玻璃控制面板 */
        .control-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 14px;
            border-radius: 10px;
            color: #1e293b;
            border: 1px solid rgba(0, 0, 0, 0.1);
            width: 230px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .control-panel.minimized {
            width: 120px;
            padding: 8px 12px;
        }
        .control-panel.minimized #panelContent {
            display: none;
        }
        .info-panel {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: rgba(15, 23, 42, 0.6);
            font-size: 11px;
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }
        input[type=range] { 
            width: 100%; 
            cursor: pointer;
            accent-color: #2563eb;
        }
        .label-group { display: flex; justify-content: space-between; margin-bottom: 2px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="controlPanel" class="control-panel">
        <div class="flex justify-between items-center border-b border-black/10 pb-2 mb-3">
            <h2 class="text-sm font-bold tracking-wide text-slate-800">3D 布朗運動</h2>
            <button id="toggleBtn" class="text-[10px] bg-black/5 hover:bg-black/10 px-2 py-0.5 rounded text-slate-700 transition-colors">收合</button>
        </div>
        
        <div id="panelContent" class="space-y-3">
            <div>
                <div class="label-group text-slate-600">
                    <span>移動步長 (速度)</span>
                    <span id="speedVal" class="text-blue-600 font-semibold">0.15</span>
                </div>
                <input type="range" id="speedRange" min="0.01" max="0.5" step="0.01" value="0.15">
            </div>

            <div>
                <div class="label-group text-slate-600">
                    <span>粒子數量</span>
                    <span id="countVal" class="text-blue-600 font-semibold">200</span>
                </div>
                <input type="range" id="countRange" min="10" max="1000" step="10" value="200">
            </div>

            <div>
                <div class="label-group text-slate-600">
                    <span>邊界大小</span>
                    <span id="boxVal" class="text-blue-600 font-semibold">20</span>
                </div>
                <input type="range" id="boxRange" min="10" max="50" step="1" value="20">
            </div>

            <button id="resetBtn" class="w-full py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-xs font-medium text-white transition-all shadow-md">重置路徑</button>
            
            <div class="text-[10px] text-slate-500 border-t border-black/10 pt-2 leading-relaxed">
                <span class="text-slate-700 font-semibold">操作說明：</span><br>
                • 滑鼠左鍵：旋轉視角<br>
                • 滑鼠右鍵 / Ctrl+左鍵：平移視角<br>
                • 滾輪：縮放畫面
            </div>
        </div>
    </div>

    <div class="info-panel">
        <p>隨機漫步演算法 (Random Walk)</p>
        <p>Three.js & OrbitControls 整合渲染</p>
    </div>

    <script>
        let scene, camera, renderer, particles = [], mainParticle, trail, trailGeometry, controls;
        let particleGroup = new THREE.Group();
        let boxHelper;
        
        // 模擬參數
        let config = {
            speed: 0.15,
            count: 200,
            boxSize: 20,
            trailMax: 1000
        };

        const trailPoints = [];

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            // 1. 設置場景 (改為白色背景)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // 2. 設置相機
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 25, 25);

            // 3. 設置渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. 輔助光源 (調整亮度以適合白色背景，增強3D立體感)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(10, 20, 15);
            scene.add(directionalLight);

            // 5. 邊界方框 (改為黑色)
            updateBox();

            // 6. 初始化粒子 (改為深灰色)
            createParticles();

            // 7. 初始化 OrbitControls（支援旋轉、滾輪縮放、右鍵平移功能）
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true; 
            controls.minDistance = 5;
            controls.maxDistance = 150;

            // 8. 事件監聽
            window.addEventListener('resize', onWindowResize, false);
            setupControls();
            setupTogglePanel();
        }

        function createParticles() {
            // 清除舊粒子
            scene.remove(particleGroup);
            particleGroup = new THREE.Group();
            particles = [];
            
            const geometry = new THREE.SphereGeometry(0.1, 8, 8);
            // 改為中深灰色粒子，並略微提高不透明度，使其在白色背景上更明顯
            const material = new THREE.MeshBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.75 });

            for (let i = 0; i < config.count; i++) {
                const p = new THREE.Mesh(geometry, material);
                p.position.set(
                    (Math.random() - 0.5) * config.boxSize,
                    (Math.random() - 0.5) * config.boxSize,
                    (Math.random() - 0.5) * config.boxSize
                );
                particles.push(p);
                particleGroup.add(p);
            }

            // 特殊的主粒子（追蹤用，經典紅橘色）
            const mainGeom = new THREE.SphereGeometry(0.35, 16, 16);
            const mainMat = new THREE.MeshPhongMaterial({ color: 0xe11d48, shininess: 100 });
            mainParticle = new THREE.Mesh(mainGeom, mainMat);
            mainParticle.position.set(0, 0, 0);
            particleGroup.add(mainParticle);

            // 初始化軌跡
            trailPoints.length = 0;
            trailPoints.push(new THREE.Vector3(0, 0, 0));
            
            trailGeometry = new THREE.BufferGeometry().setFromPoints(trailPoints);
            const trailMaterial = new THREE.LineBasicMaterial({ color: 0xe11d48, transparent: true, opacity: 0.8 });
            trail = new THREE.Line(trailGeometry, trailMaterial);
            scene.add(trail);

            scene.add(particleGroup);
        }

        function updateBox() {
            if (boxHelper) scene.remove(boxHelper);
            const boxGeom = new THREE.BoxGeometry(config.boxSize, config.boxSize, config.boxSize);
            const edges = new THREE.EdgesGeometry(boxGeom);
            // 邊界框線設定為純黑色 0x000000
            boxHelper = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
            scene.add(boxHelper);
        }

        function setupControls() {
            const speedInput = document.getElementById('speedRange');
            const countInput = document.getElementById('countRange');
            const boxInput = document.getElementById('boxRange');
            const resetBtn = document.getElementById('resetBtn');

            speedInput.oninput = (e) => {
                config.speed = parseFloat(e.target.value);
                document.getElementById('speedVal').innerText = config.speed;
            };

            countInput.onchange = (e) => {
                config.count = parseInt(e.target.value);
                document.getElementById('countVal').innerText = config.count;
                createParticles();
            };

            boxInput.oninput = (e) => {
                config.boxSize = parseInt(e.target.value);
                document.getElementById('boxVal').innerText = config.boxSize;
                updateBox();
            };

            resetBtn.onclick = () => {
                trailPoints.length = 0;
                mainParticle.position.set(0,0,0);
                trailPoints.push(new THREE.Vector3(0, 0, 0));
            };
        }

        function setupTogglePanel() {
            const toggleBtn = document.getElementById('toggleBtn');
            const controlPanel = document.getElementById('controlPanel');
            let minimized = false;

            toggleBtn.onclick = () => {
                minimized = !minimized;
                if (minimized) {
                    controlPanel.classList.add('minimized');
                    toggleBtn.innerText = '展開';
                } else {
                    controlPanel.classList.remove('minimized');
                    toggleBtn.innerText = '收合';
                }
            };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 更新相機軌道控制器
            if (controls) controls.update();

            const halfBox = config.boxSize / 2;

            // 更新所有普通粒子
            particles.forEach(p => {
                p.position.x += (Math.random() - 0.5) * config.speed;
                p.position.y += (Math.random() - 0.5) * config.speed;
                p.position.z += (Math.random() - 0.5) * config.speed;

                // 邊界穿透回繞
                if (p.position.x > halfBox) p.position.x = -halfBox;
                if (p.position.x < -halfBox) p.position.x = halfBox;
                if (p.position.y > halfBox) p.position.y = -halfBox;
                if (p.position.y < -halfBox) p.position.y = halfBox;
                if (p.position.z > halfBox) p.position.z = -halfBox;
                if (p.position.z < -halfBox) p.position.z = halfBox;
            });

            // 更新紅色主粒子
            mainParticle.position.x += (Math.random() - 0.5) * config.speed;
            mainParticle.position.y += (Math.random() - 0.5) * config.speed;
            mainParticle.position.z += (Math.random() - 0.5) * config.speed;

            // 限制主粒子在箱子邊界內
            mainParticle.position.clamp(
                new THREE.Vector3(-halfBox, -halfBox, -halfBox),
                new THREE.Vector3(halfBox, halfBox, halfBox)
            );

            // 更新紅色軌跡
            const newPos = mainParticle.position.clone();
            trailPoints.push(newPos);
            if (trailPoints.length > config.trailMax) {
                trailPoints.shift();
            }
            trail.geometry.setFromPoints(trailPoints);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
